<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<meta name="robots" content="noindex">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,600;1,400&family=Nunito:wght@400;700&display=swap" rel="stylesheet">
<title>Page Not Found — Kor Da</title>
<style>
:root{--p:#1A5C6B;--pd:#0F3840;--cream:#FAF8F3;--ink:#0D1F26;--ink3:#4A7080}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Nunito',sans-serif;background:var(--cream);min-height:100vh;display:flex;align-items:center;justify-content:center;text-align:center;padding:40px 20px}
.card{background:white;border-radius:24px;padding:48px 40px;box-shadow:0 20px 60px rgba(13,31,38,.09);max-width:460px;width:100%}
.num{font-family:'Playfair Display',serif;font-size:7rem;font-weight:700;color:var(--p);opacity:.12;line-height:1;margin-bottom:-20px;font-style:italic}
.icon{font-size:4rem;margin-bottom:16px;display:block;animation:float 3s ease-in-out infinite}
h1{font-family:'Playfair Display',serif;font-size:2.2rem;color:var(--ink);margin-bottom:12px}
p{color:var(--ink3);line-height:1.7;margin-bottom:28px;font-size:.95rem}
a{display:inline-block;padding:14px 28px;background:linear-gradient(135deg,#1A5C6B,#0F3840);color:white;border-radius:10px;font-weight:700;font-size:.9rem;text-decoration:none;transition:transform .2s}
a:hover{transform:translateY(-2px)}
@keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-8px)}}
</style>
</head>
<body>
<div class="card">
  <div class="num">404</div>
  <span class="icon">🏡</span>
  <h1>This Home<br><em>Doesn't Exist</em></h1>
  <p>The page you're looking for has moved or never existed. Let's get you back.</p>
  <a href="index.html">← Back to Kor Da</a>
</div>
</body>
</html>
